type: huggingface_mixture
name: wikitext2-evol-codealpaca-tulu-math
subset: default
data_path: ${paths.data_dir}
task_type: compression_default
sampling: sequential
block_size: 2048
preprocessing:
  type: ${data.task_type}
num_samples: ${compression.num_calibration_samples}
num_samples_val: 64
seed: -1

datasets:
  - name: wikitext
    subset: wikitext-2-raw-v1
    split: train
    validation_split: validation
    text_field: text
  - name: theblackcat102/evol-codealpaca-v1
    split: train
  - name: allenai/tulu-3-sft-personas-math
    split: train
